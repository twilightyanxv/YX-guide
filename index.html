  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f8fafc;
      --bg-card: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-light: #eff6ff;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
      --radius: 12px;
      --transition: 0.2s ease;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ---- Header ---- */
    header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.85);
    }

    header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
    }

    nav {
      display: flex;
      gap: 8px;
    }

    nav a {
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 8px;
      transition: all var(--transition);
    }

    nav a:hover {
      color: var(--accent);
      background: var(--accent-light);
    }

    .lang-switch {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .lang-btn {
      background: none;
      border: none;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      padding: 4px 6px;
      border-radius: 4px;
      transition: all var(--transition);
    }

    .lang-btn:hover {
      color: var(--accent);
    }

    .lang-btn.active {
      color: var(--accent);
      font-weight: 600;
    }

    .lang-divider {
      color: var(--border);
      font-size: 13px;
    }

    /* ---- Filter Bar ---- */
    .filter-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin: 24px 0 24px;
    }

    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .category-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      font-family: inherit;
    }

    .category-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .category-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .search-box {
      max-width: 320px;
      min-width: 200px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--bg-card);
      color: var(--text-primary);
      outline: none;
      transition: all var(--transition);
      font-family: inherit;
    }

    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    .search-box .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none;
    }

    /* ---- Tools Grid ---- */

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding-bottom: 64px;
    }

    .tool-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-decoration: none;
      color: inherit;
      transition: all var(--transition);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tool-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .tool-card .tool-icon {
      font-size: 28px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .tool-card .tool-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .tool-card .tool-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tool-card .tool-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: auto;
      padding-top: 8px;
    }

    .tool-card .tool-tags span {
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 12px;
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 500;
    }

    .tool-card.hidden {
      display: none;
    }

    /* ---- No Results ---- */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .no-results p {
      font-size: 15px;
    }

    /* ---- Footer ---- */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ---- Back to Top ---- */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    .back-to-top {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 18px;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      visibility: hidden;
      transition: all var(--transition);
      z-index: 99;
    }

    .back-to-top.visible {
      opacity: 1;
      visibility: visible;
    }

    .back-to-top:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }

    /* ---- Responsive ---- */
    @media (max-width: 768px) {
      .filter-bar { flex-direction: column; align-items: stretch; }
      .search-box { max-width: 100%; }
      .tools-grid { grid-template-columns: 1fr; }
      nav a { font-size: 13px; padding: 6px 10px; }
    }

    @media (max-width: 480px) {
      .container { padding: 0 16px; }
    }
  </style>

<body>

  <header>
    <div class="container">
      <a href="/" class="logo" aria-label="YxToolHub 首页">
        <span class="logo-icon">Y</span>
        YxToolHub
      </a>
      <div class="lang-switch">
        <button class="lang-btn" data-lang="zh">中文</button>
        <span class="lang-divider">|</span>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
    </div>
  </header>

  <main>
    <h1 class="sr-only">YxToolHub - 免费在线图片去水印工具</h1>

    <section class="container" id="categories" aria-label="工具分类">
      <div class="filter-bar">
        <div class="categories" id="categoryFilters" role="tablist" aria-label="工具分类筛选">
          <button class="category-btn active" data-category="all" role="tab" aria-selected="true" data-i18n="categoryAll">全部</button>
        </div>
        <div class="search-box">
          <span class="search-icon" aria-hidden="true">&#128269;</span>
          <input
            type="text"
            id="searchInput"
            placeholder="搜索工具..."
            aria-label="搜索工具"
            data-i18n-placeholder="searchPlaceholder"
            data-i18n-aria="searchAria"
            autocomplete="off"
          >
        </div>
      </div>
    </section>

    <section class="container" id="tools" aria-label="工具列表">
      <div class="tools-grid" id="toolsGrid"></div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 YxToolHub. <span data-i18n="footerText">精选工具导航</span> &mdash; <a href="https://guide.yanxv.com/" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;">guide.yanxv.com</a></p>
    </div>
  </footer>

  <button class="back-to-top" id="backToTop" aria-label="返回顶部" data-i18n-aria="backToTop">&#8593;</button>

  <script>
    const LANG_KEY = 'yx-lang';
    let lang = localStorage.getItem(LANG_KEY) || 'zh';

    const i18n = {
      zh: {
        categoryAll: '全部',
        searchPlaceholder: '搜索工具...',
        searchAria: '搜索工具',
        noResults: '没有找到匹配的工具，试试其他关键词吧',
        footerText: '精选工具导航',
        backToTop: '返回顶部',
        tools: [
          { name: '图片去水印', desc: '纯本地处理，隐私防护，免费在线使用', icon: '&#128247;', category: '设计工具', tags: ['去水印', '本地', '隐私'], url: 'https://watermark-remover.yanxv.com/' },
        ],
      },
      en: {
        categoryAll: 'All',
        searchPlaceholder: 'Search tools...',
        searchAria: 'Search tools',
        noResults: 'No matching tools found, try other keywords',
        footerText: 'Curated Tools',
        backToTop: 'Back to top',
        tools: [
          { name: 'Image Watermark Remover', desc: '100% local processing, privacy protected, free to use', icon: '&#128247;', category: 'Design Tools', tags: ['Watermark', 'Local', 'Privacy'], url: 'https://watermark-remover.yanxv.com/' },
        ],
      },
    };

    function t(key) {
      return i18n[lang][key];
    }

    function getToolsData() {
      return i18n[lang].tools;
    }

    function applyLang() {
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';

      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        el.placeholder = t(el.dataset.i18nPlaceholder);
      });
      document.querySelectorAll('[data-i18n-aria]').forEach(el => {
        el.setAttribute('aria-label', t(el.dataset.i18nAria));
      });

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
    }

    // ---- Category & Tool rendering ----
    const categoryContainer = document.getElementById('categoryFilters');
    const grid = document.getElementById('toolsGrid');
    const searchInput = document.getElementById('searchInput');

    let activeCategory = 'all';
    let searchQuery = '';

    function renderCategories() {
      const allBtn = categoryContainer.querySelector('[data-category="all"]');
      allBtn.textContent = t('categoryAll');

      const existing = categoryContainer.querySelectorAll('[data-category]:not([data-category="all"])');
      existing.forEach(b => b.remove());

      const cats = [...new Set(getToolsData().map(t => t.category))];
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'category-btn';
        btn.dataset.category = cat;
        btn.setAttribute('role', 'tab');
        btn.textContent = cat;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.category-btn').forEach(b => {
            b.classList.remove('active');
            b.setAttribute('aria-selected', 'false');
          });
          btn.classList.add('active');
          btn.setAttribute('aria-selected', 'true');
          activeCategory = btn.dataset.category;
          filterTools();
        });
        categoryContainer.appendChild(btn);
      });

      categoryContainer.querySelector('[data-category="all"]').classList.add('active');
      categoryContainer.querySelector('[data-category="all"]').setAttribute('aria-selected', 'true');
      activeCategory = 'all';
    }

    function filterTools() {
      const toolsData = getToolsData();
      const filtered = toolsData.filter(tool => {
        const matchCategory = activeCategory === 'all' || tool.category === activeCategory;
        const q = searchQuery.toLowerCase().trim();
        const matchSearch = !q ||
          tool.name.toLowerCase().includes(q) ||
          tool.desc.toLowerCase().includes(q) ||
          tool.tags.some(tag => tag.toLowerCase().includes(q));
        return matchCategory && matchSearch;
      });
      renderTools(filtered);
    }

    function renderTools(tools) {
      if (tools.length === 0) {
        grid.innerHTML = `<div class="no-results"><p>${t('noResults')}</p></div>`;
        return;
      }
      grid.innerHTML = tools.map(tool => `
        <a href="${tool.url || '#'}" class="tool-card" target="_blank" rel="noopener">
          <div class="tool-icon">${tool.icon}</div>
          <h2 class="tool-name">${tool.name}</h2>
          <p class="tool-desc">${tool.desc}</p>
          <div class="tool-tags">${tool.tags.map(t => `<span>${t}</span>`).join('')}</div>
        </a>
      `).join('');
    }

    function setLang(newLang) {
      lang = newLang;
      localStorage.setItem(LANG_KEY, newLang);
      applyLang();
      renderCategories();
      filterTools();
    }

    // ---- Events ----
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => setLang(btn.dataset.lang));
    });

    categoryContainer.querySelector('[data-category="all"]').addEventListener('click', () => {
      document.querySelectorAll('.category-btn').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-selected', 'false');
      });
      categoryContainer.querySelector('[data-category="all"]').classList.add('active');
      categoryContainer.querySelector('[data-category="all"]').setAttribute('aria-selected', 'true');
      activeCategory = 'all';
      filterTools();
    });

    searchInput.addEventListener('input', e => {
      searchQuery = e.target.value;
      filterTools();
    });

    // ---- Back to Top ----
    const backToTop = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      backToTop.classList.toggle('visible', window.scrollY > 400);
    });
    backToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // ---- Init ----
    applyLang();
    renderCategories();
    filterTools();
  </script>
</body>
