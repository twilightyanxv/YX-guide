<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="精选优质在线工具集合 - 开发、设计、写作、图片处理、文件转换等一站式工具导航，提升工作效率的必备收藏。">
  <meta name="keywords" content="在线工具,开发工具,设计工具,图片处理,文件转换,程序员工具,导航网站">
  <meta name="author" content="ToolHub">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://toolhub.example.com/">

  <meta property="og:title" content="ToolHub - 精选在线工具导航">
  <meta property="og:description" content="精选优质在线工具集合，涵盖开发、设计、写作、图片处理等类别，一站式提升工作效率。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://toolhub.example.com/">
  <meta property="og:locale" content="zh_CN">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ToolHub - 精选在线工具导航">
  <meta name="twitter:description" content="精选优质在线工具集合，涵盖开发、设计、写作、图片处理等类别，一站式提升工作效率。">

  <title>ToolHub - 精选在线工具导航 | 一站式工具集合</title>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "ToolHub",
    "url": "https://toolhub.example.com/",
    "description": "精选优质在线工具集合，涵盖开发、设计、写作、图片处理等类别",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://toolhub.example.com/?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f8fafc;
      --bg-card: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-light: #eff6ff;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
      --radius: 12px;
      --transition: 0.2s ease;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ---- Header ---- */
    header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.85);
    }

    header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
    }

    nav {
      display: flex;
      gap: 8px;
    }

    nav a {
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 8px;
      transition: all var(--transition);
    }

    nav a:hover {
      color: var(--accent);
      background: var(--accent-light);
    }

    /* ---- Hero ---- */
    .hero {
      padding: 80px 0 56px;
      text-align: center;
    }

    .hero h1 {
      font-size: 44px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .hero h1 span {
      color: var(--accent);
    }

    .hero p {
      font-size: 18px;
      color: var(--text-secondary);
      max-width: 560px;
      margin: 0 auto 32px;
    }

    .search-box {
      max-width: 520px;
      margin: 0 auto;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 14px 20px 14px 48px;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-card);
      color: var(--text-primary);
      outline: none;
      transition: all var(--transition);
      font-family: inherit;
    }

    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    .search-box .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 18px;
      pointer-events: none;
    }

    .search-status {
      text-align: center;
      margin-top: 12px;
      font-size: 14px;
      color: var(--text-muted);
      min-height: 22px;
    }

    /* ---- Categories ---- */
    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 48px;
    }

    .category-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      font-family: inherit;
    }

    .category-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .category-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ---- Tools Grid ---- */
    .section-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--text-primary);
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding-bottom: 64px;
    }

    .tool-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-decoration: none;
      color: inherit;
      transition: all var(--transition);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tool-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .tool-card .tool-icon {
      font-size: 28px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .tool-card .tool-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .tool-card .tool-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tool-card .tool-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: auto;
      padding-top: 8px;
    }

    .tool-card .tool-tags span {
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 12px;
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 500;
    }

    .tool-card.hidden {
      display: none;
    }

    /* ---- No Results ---- */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .no-results p {
      font-size: 15px;
    }

    /* ---- Footer ---- */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ---- Back to Top ---- */
    .back-to-top {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 18px;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      visibility: hidden;
      transition: all var(--transition);
      z-index: 99;
    }

    .back-to-top.visible {
      opacity: 1;
      visibility: visible;
    }

    .back-to-top:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }

    /* ---- Responsive ---- */
    @media (max-width: 768px) {
      .hero h1 { font-size: 30px; }
      .hero p { font-size: 16px; }
      .hero { padding: 48px 0 32px; }
      .tools-grid { grid-template-columns: 1fr; }
      nav a { font-size: 13px; padding: 6px 10px; }
    }

    @media (max-width: 480px) {
      .hero h1 { font-size: 26px; }
      .container { padding: 0 16px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <a href="/" class="logo" aria-label="ToolHub 首页">
        <span class="logo-icon">T</span>
        ToolHub
      </a>
      <nav aria-label="主导航">
        <a href="#tools">全部工具</a>
        <a href="#categories">分类</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero" aria-label="网站介绍">
      <div class="container">
        <h1>精选 <span>在线工具</span> 导航</h1>
        <p>发现优质在线工具，提升开发、设计与日常工作效率。每一个都经过精心筛选。</p>
        <div class="search-box">
          <span class="search-icon" aria-hidden="true">&#128269;</span>
          <input
            type="text"
            id="searchInput"
            placeholder="搜索工具名称、描述或标签..."
            aria-label="搜索工具"
            autocomplete="off"
          >
        </div>
        <div class="search-status" id="searchStatus" aria-live="polite"></div>
      </div>
    </section>

    <section class="container" id="categories" aria-label="工具分类">
      <div class="categories" id="categoryFilters" role="tablist" aria-label="工具分类筛选">
        <button class="category-btn active" data-category="all" role="tab" aria-selected="true">全部</button>
      </div>
    </section>

    <section class="container" id="tools" aria-label="工具列表">
      <h2 class="section-title" id="sectionTitle">全部工具</h2>
      <div class="tools-grid" id="toolsGrid" aria-labelledby="sectionTitle"></div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 ToolHub. 精选在线工具导航 &mdash; 持续收录优质工具。</p>
    </div>
  </footer>

  <button class="back-to-top" id="backToTop" aria-label="返回顶部">&#8593;</button>

  <script>
    const toolsData = [
      // ---- 开发工具 ----
      { name: 'CodePen', desc: '在线代码编辑器，支持 HTML / CSS / JavaScript 实时预览和分享。', icon: '&#128187;', category: '开发工具', tags: ['代码', '前端', '实时预览'] },
      { name: 'JSFiddle', desc: '轻量级在线代码测试工具，快速调试 JavaScript 代码片段。', icon: '&#128736;', category: '开发工具', tags: ['JavaScript', '调试', '测试'] },
      { name: 'Regex101', desc: '强大直观的正则表达式测试工具，支持多语言语法。', icon: '&#9881;', category: '开发工具', tags: ['正则', '调试', '开发'] },
      { name: 'JSON Formatter', desc: '在线 JSON 格式化、验证与压缩工具。', icon: '&#123;', category: '开发工具', tags: ['JSON', '格式化', '验证'] },
      { name: 'DevDocs', desc: '开发者 API 文档聚合，离线可用，搜索快速。', icon: '&#128214;', category: '开发工具', tags: ['文档', 'API', '离线'] },
      { name: 'GitHub', desc: '全球最大的代码托管平台，版本控制与协作开发。', icon: '&#128187;', category: '开发工具', tags: ['代码托管', 'Git', '协作'] },
      { name: 'StackBlitz', desc: '基于浏览器的 IDE，秒级启动 Angular / React / Vue 项目。', icon: '&#9889;', category: '开发工具', tags: ['IDE', '前端', '在线'] },
      { name: 'Diff Checker', desc: '在线文本对比工具，精准标识差异行。', icon: '&#8694;', category: '开发工具', tags: ['对比', '文本', 'diff'] },

      // ---- 设计工具 ----
      { name: 'Figma', desc: '协作式 UI 设计工具，多人实时编辑，组件化设计系统。', icon: '&#127912;', category: '设计工具', tags: ['设计', 'UI/UX', '协作'] },
      { name: 'Coolors', desc: '一键生成配色方案，快速创建调色板并导出。', icon: '&#127752;', category: '设计工具', tags: ['配色', '色彩', '生成'] },
      { name: 'Remove.bg', desc: 'AI 自动去除图片背景，秒级处理，无需手动抠图。', icon: '&#128247;', category: '设计工具', tags: ['去背景', 'AI', '图片'] },
      { name: 'Compressor.io', desc: '在线图片压缩，支持 JPEG / PNG / WebP 等格式。', icon: '&#128190;', category: '设计工具', tags: ['压缩', '图片', '优化'] },
      { name: 'Font Awesome', desc: '最流行的图标库，免费图标资源丰富。', icon: '&#127775;', category: '设计工具', tags: ['图标', '字体', '资源'] },
      { name: 'Canva', desc: '在线平面设计平台，模板丰富，拖拽式操作。', icon: '&#127912;', category: '设计工具', tags: ['设计', '模板', '平面'] },

      // ---- 写作与内容 ----
      { name: 'Notion', desc: '全能笔记与知识管理工具，支持数据库、看板、文档协作。', icon: '&#128221;', category: '写作笔记', tags: ['笔记', '文档', '协作'] },
      { name: 'DeepL', desc: '高质量 AI 翻译工具，比传统翻译更自然准确。', icon: '&#127758;', category: '写作笔记', tags: ['翻译', 'AI', '多语言'] },
      { name: 'Grammarly', desc: '英文写作助手，实时检查语法、拼写与语气。', icon: '&#9997;', category: '写作笔记', tags: ['语法', '英文', '写作'] },

      // ---- 文件转换 ----
      { name: 'CloudConvert', desc: '支持 200+ 格式的文件在线转换，音视频、文档、图片。', icon: '&#128259;', category: '文件转换', tags: ['转换', '文件', '多格式'] },
      { name: 'Smallpdf', desc: 'PDF 全能工具：压缩、合并、分割、转换格式。', icon: '&#128196;', category: '文件转换', tags: ['PDF', '转换', '编辑'] },

      // ---- 网络与 SEO ----
      { name: 'PageSpeed', desc: 'Google 官方网页性能分析工具，优化建议详实。', icon: '&#128640;', category: '网络运维', tags: ['性能', 'SEO', '优化'] },
      { name: 'Pingdom', desc: '网站速度与可用性监测，全球节点测试。', icon: '&#127760;', category: '网络运维', tags: ['监控', '速度', '可用性'] },
    ];

    const categoryNames = [...new Set(toolsData.map(t => t.category))];

    const categoryContainer = document.getElementById('categoryFilters');
    categoryNames.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'category-btn';
      btn.dataset.category = cat;
      btn.setAttribute('role', 'tab');
      btn.textContent = cat;
      categoryContainer.appendChild(btn);
    });

    const grid = document.getElementById('toolsGrid');
    const searchInput = document.getElementById('searchInput');
    const searchStatus = document.getElementById('searchStatus');
    const sectionTitle = document.getElementById('sectionTitle');

    let activeCategory = 'all';
    let searchQuery = '';

    function filterTools() {
      const filtered = toolsData.filter(tool => {
        const matchCategory = activeCategory === 'all' || tool.category === activeCategory;
        const q = searchQuery.toLowerCase().trim();
        const matchSearch = !q ||
          tool.name.toLowerCase().includes(q) ||
          tool.desc.toLowerCase().includes(q) ||
          tool.tags.some(tag => tag.toLowerCase().includes(q));
        return matchCategory && matchSearch;
      });
      renderTools(filtered);
      const visibleCount = filtered.length;
      const total = toolsData.length;
      const categoryLabel = activeCategory === 'all' ? '全部工具' : activeCategory;
      if (searchQuery.trim()) {
        sectionTitle.textContent = `\`${searchQuery}\` 的搜索结果`;
        searchStatus.textContent = visibleCount > 0
          ? `找到 ${visibleCount} 个相关工具`
          : `没有找到匹配 "${searchQuery}" 的工具`;
      } else {
        sectionTitle.textContent = categoryLabel;
        searchStatus.textContent = '';
      }
    }

    function renderTools(tools) {
      if (tools.length === 0) {
        grid.innerHTML = '<div class="no-results"><p>没有找到匹配的工具，试试其他关键词吧</p></div>';
        return;
      }
      grid.innerHTML = tools.map(tool => `
        <a href="#" class="tool-card" target="_blank" rel="noopener">
          <div class="tool-icon">${tool.icon}</div>
          <div class="tool-name">${tool.name}</div>
          <div class="tool-desc">${tool.desc}</div>
          <div class="tool-tags">${tool.tags.map(t => `<span>${t}</span>`).join('')}</div>
        </a>
      `).join('');
    }

    categoryContainer.addEventListener('click', e => {
      const btn = e.target.closest('.category-btn');
      if (!btn) return;
      document.querySelectorAll('.category-btn').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-selected', 'false');
      });
      btn.classList.add('active');
      btn.setAttribute('aria-selected', 'true');
      activeCategory = btn.dataset.category;
      filterTools();
    });

    searchInput.addEventListener('input', e => {
      searchQuery = e.target.value;
      filterTools();
    });

    filterTools();

    // ---- Back to Top ----
    const backToTop = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      backToTop.classList.toggle('visible', window.scrollY > 400);
    });
    backToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
