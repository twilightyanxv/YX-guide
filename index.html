  <script>
    const LANG_KEY = 'yx-lang';
    const browserLang = navigator.language.startsWith('zh') ? 'zh' : 'en';
let lang = localStorage.getItem(LANG_KEY) || browserLang;

    const i18n = {
      zh: {
        pageTitle: '精选免费在线工具',
        pageSubtitle: '一站式工具导航，全部免费使用',
        categoryAll: '全部',
        searchPlaceholder: '搜索工具...',
        searchAria: '搜索工具',
        noResults: '没有找到匹配的工具，试试其他关键词吧',
        footerText: '精选工具导航',
        backToTop: '返回顶部',
        tools: [
          { name: '图片去水印', desc: '纯本地处理，隐私防护，免费在线使用', icon: '&#128247;', category: '设计工具', tags: ['去水印', '本地', '隐私'], url: 'https://watermark-remover.yanxv.com/' },
          { name: '声音克隆', desc: '在线AI声音克隆，免费使用', icon: '&#127925;', category: 'AI工具', tags: ['声音克隆', 'AI', '音频'], url: 'https://nicevoice.org/' },
          { name: '代码截图', desc: '生成美观的代码截图', icon: '&#128187;', category: '开发工具', tags: ['截图', '代码', '分享'], url: 'https://carbon.now.sh/' },
          { name: '在线白板', desc: '手绘风格协作白板', icon: '&#127912;', category: '设计工具', tags: ['白板', '协作', '手绘'], url: 'https://excalidraw.com/' },
          { name: '在线PS', desc: '浏览器内专业图片编辑', icon: '&#128444;', category: '设计工具', tags: ['图片编辑', 'PS', '在线'], url: 'https://www.photopea.com/' },
          { name: '抠图去背景', desc: 'AI 一键去除背景', icon: '&#128200;', category: '设计工具', tags: ['抠图', '去背景', 'AI'], url: 'https://www.remove.bg/zh/' },
          { name: '人声分离', desc: '在线分离伴奏和人声', icon: '&#127926;', category: '音频工具', tags: ['音频', '人声分离', '伴奏'], url: 'https://vocalremover.org/zh/' },
          { name: 'PDF工具箱', desc: '压缩、合并、转换 PDF', icon: '&#128196;', category: '文件工具', tags: ['PDF', '压缩', '转换'], url: 'https://www.ilovepdf.com/zh-cn/' },
          { name: 'AI图片放大', desc: 'AI 无损放大图片', icon: '&#128752;', category: 'AI工具', tags: ['AI', '图片放大', '无损'], url: 'https://upscale.media/' },
          { name: '格式转换', desc: '在线转换各种文件格式', icon: '&#128259;', category: '文件工具', tags: ['转换', '格式', '文件'], url: 'https://convertio.co/zh/' },
          { name: '图片压缩', desc: 'Google 出品在线图片压缩', icon: '&#128228;', category: '设计工具', tags: ['图片压缩', 'Google', '图片'], url: 'https://squoosh.app/' },
          { name: '正则测试', desc: '在线正则表达式调试工具', icon: '&#128269;', category: '开发工具', tags: ['正则', '调试', '测试'], url: 'https://regex101.com/' },
        ],
      },
      en: {
        pageTitle: 'Curated Free Online Tools',
        pageSubtitle: 'One-stop tool collection, all free to use',
        categoryAll: 'All',
        searchPlaceholder: 'Search tools...',
        searchAria: 'Search tools',
        noResults: 'No matching tools found, try other keywords',
        footerText: 'Curated Tools',
        backToTop: 'Back to top',
        tools: [
          { name: 'Image Watermark Remover', desc: '100% local processing, privacy protected, free to use', icon: '&#128247;', category: 'Design Tools', tags: ['Watermark', 'Local', 'Privacy'], url: 'https://watermark-remover.yanxv.com/' },
          { name: 'Voice Cloning', desc: 'Online AI voice cloning, free to use', icon: '&#127925;', category: 'AI Tools', tags: ['Voice Cloning', 'AI', 'Audio'], url: 'https://nicevoice.org/' },
          { name: 'Carbon', desc: 'Create beautiful code screenshots', icon: '&#128187;', category: 'Dev Tools', tags: ['Screenshot', 'Code', 'Share'], url: 'https://carbon.now.sh/' },
          { name: 'Excalidraw', desc: 'Virtual hand-drawn style whiteboard', icon: '&#127912;', category: 'Design Tools', tags: ['Whiteboard', 'Collaboration', 'Sketch'], url: 'https://excalidraw.com/' },
          { name: 'Photopea', desc: 'Professional image editor in browser', icon: '&#128444;', category: 'Design Tools', tags: ['Image Editor', 'Photoshop', 'Online'], url: 'https://www.photopea.com/' },
          { name: 'Remove.bg', desc: 'AI background removal in seconds', icon: '&#128200;', category: 'Design Tools', tags: ['Remove', 'Background', 'AI'], url: 'https://www.remove.bg/' },
          { name: 'Vocal Remover', desc: 'Separate vocals and accompaniment', icon: '&#127926;', category: 'Audio Tools', tags: ['Audio', 'Vocal', 'Accompaniment'], url: 'https://vocalremover.org/' },
          { name: 'iLovePDF', desc: 'Compress, merge, convert PDFs', icon: '&#128196;', category: 'File Tools', tags: ['PDF', 'Compress', 'Convert'], url: 'https://www.ilovepdf.com/' },
          { name: 'Upscale.media', desc: 'AI image upscaler with quality', icon: '&#128752;', category: 'AI Tools', tags: ['AI', 'Upscale', 'Quality'], url: 'https://upscale.media/' },
          { name: 'Convertio', desc: 'Online file format converter', icon: '&#128259;', category: 'File Tools', tags: ['Convert', 'Format', 'File'], url: 'https://convertio.co/' },
          { name: 'Squoosh', desc: 'Google image compression tool', icon: '&#128228;', category: 'Design Tools', tags: ['Compression', 'Google', 'Image'], url: 'https://squoosh.app/' },
          { name: 'Regex101', desc: 'Online regex tester and debugger', icon: '&#128269;', category: 'Dev Tools', tags: ['Regex', 'Debug', 'Test'], url: 'https://regex101.com/' },
        ],
      },
    };

    function t(key) {
      return i18n[lang][key];
    }

    function getToolsData() {
      return i18n[lang].tools;
    }

    function applyLang() {
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';

      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        el.placeholder = t(el.dataset.i18nPlaceholder);
      });
      document.querySelectorAll('[data-i18n-aria]').forEach(el => {
        el.setAttribute('aria-label', t(el.dataset.i18nAria));
      });

      document.querySelectorAll('.lang-btn').forEach(btn => {
        if (btn.dataset.lang === lang) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    }

    // ---- Category & Tool rendering ----
    const categoryContainer = document.getElementById('categoryFilters');
    const grid = document.getElementById('toolsGrid');
    const searchInput = document.getElementById('searchInput');

    let activeCategory = 'all';
    let searchQuery = '';

    function renderCategories() {
      const allBtn = categoryContainer.querySelector('[data-category="all"]');
      allBtn.textContent = t('categoryAll');

      const existing = categoryContainer.querySelectorAll('[data-category]:not([data-category="all"])');
      existing.forEach(b => b.remove());

      const cats = [...new Set(getToolsData().map(t => t.category))];
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'category-btn';
        btn.dataset.category = cat;
        btn.setAttribute('role', 'tab');
        btn.textContent = cat;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.category-btn').forEach(b => {
            b.classList.remove('active');
            b.setAttribute('aria-selected', 'false');
          });
          btn.classList.add('active');
          btn.setAttribute('aria-selected', 'true');
          activeCategory = btn.dataset.category;
          filterTools();
        });
        categoryContainer.appendChild(btn);
      });

      categoryContainer.querySelector('[data-category="all"]').classList.add('active');
      categoryContainer.querySelector('[data-category="all"]').setAttribute('aria-selected', 'true');
      activeCategory = 'all';
    }

    function filterTools() {
      const toolsData = getToolsData();
      const filtered = toolsData.filter(tool => {
        const matchCategory = activeCategory === 'all' || tool.category === activeCategory;
        const q = searchQuery.toLowerCase().trim();
        const matchSearch = !q ||
          tool.name.toLowerCase().includes(q) ||
          tool.desc.toLowerCase().includes(q) ||
          tool.tags.some(tag => tag.toLowerCase().includes(q));
        return matchCategory && matchSearch;
      });
      renderTools(filtered);
    }

    function renderTools(tools) {
      if (tools.length === 0) {
        grid.innerHTML = `<div class="no-results"><p>${t('noResults')}</p></div>`;
        return;
      }
      grid.innerHTML = tools.map(tool => `
        <a href="${tool.url || '#'}" class="tool-card" target="_blank" rel="noopener">
          <div class="tool-icon">${tool.icon}</div>
          <h2 class="tool-name">${tool.name}</h2>
          <p class="tool-desc">${tool.desc}</p>
          <div class="tool-tags">${tool.tags.map(t => `<span>${t}</span>`).join('')}</div>
        </a>
      `).join('');
    }

    function setLang(newLang) {
      lang = newLang;
      localStorage.setItem(LANG_KEY, newLang);
      applyLang();
      renderCategories();
      filterTools();
    }

    // ---- Events ----
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => setLang(btn.dataset.lang));
    });

    categoryContainer.querySelector('[data-category="all"]').addEventListener('click', () => {
      document.querySelectorAll('.category-btn').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-selected', 'false');
      });
      categoryContainer.querySelector('[data-category="all"]').classList.add('active');
      categoryContainer.querySelector('[data-category="all"]').setAttribute('aria-selected', 'true');
      activeCategory = 'all';
      filterTools();
    });

    searchInput.addEventListener('input', e => {
      searchQuery = e.target.value;
      filterTools();
    });

    // ---- Back to Top ----
    const backToTop = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 400) {
        backToTop.classList.add('visible');
      } else {
        backToTop.classList.remove('visible');
      }
    });
    backToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // ---- Init ----
    applyLang();
    renderCategories();
    filterTools();
  </script>
</body>
